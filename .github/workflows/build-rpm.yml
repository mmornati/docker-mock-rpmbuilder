name: Build RPM

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'  # Weekly sanity build

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and test Docker image
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: Inspect image
        run: |
          docker inspect ${{ env.IMAGE_NAME }}:test

      - name: Verify Mock installation
        run: |
          docker run --rm --name mocktest ${{ env.IMAGE_NAME }}:test \
            su - mockbuilder -c "/usr/sbin/mock --version"

      - name: Run ShellCheck on build script
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."

  # Job 2: Integration test - build hello RPM on CentOS Stream 10
  test-centos-stream-10:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        run: |
          docker build -t mock-rpmbuilder:test .

      - name: Prepare test environment
        run: |
          mkdir -p rpmbuild/{SPECS,SOURCES,output,cache}
          # Download hello source
          curl -L -o rpmbuild/SOURCES/hello-2.10.tar.gz \
            https://ftp.gnu.org/gnu/hello/hello-2.10.tar.gz
          # Copy spec file
          cp tests/hello.spec rpmbuild/SPECS/

      - name: Build RPM with CentOS Stream 10
        run: |
          docker run --rm \
            --privileged=true \
            --volume "$(pwd)/rpmbuild:/rpmbuild" \
            -e MOCK_CONFIG="centos-stream-10-x86_64" \
            -e MOUNT_POINT="/rpmbuild" \
            -e SPEC_FILE="SPECS/hello.spec" \
            -e SOURCES="SOURCES" \
            -e NO_CLEANUP="true" \
            mock-rpmbuilder:test

      - name: Check build output
        run: |
          echo "=== Output directory ==="
          ls -la rpmbuild/output/centos-stream-10-x86_64/
          echo ""
          echo "=== Built RPMs ==="
          find rpmbuild/output -name "*.rpm" -type f
          echo ""
          echo "=== Build log ==="
          cat rpmbuild/output/centos-stream-10-x86_64/build.log | tail -20

      - name: Verify RPMs built
        run: |
          RPM_COUNT=$(find rpmbuild/output -name "*.rpm" -type f | wc -l)
          echo "Found $RPM_COUNT RPM files"
          if [ "$RPM_COUNT" -lt 1 ]; then
            echo "ERROR: No RPMs built!"
            exit 1
          fi
          echo "=== RPM list ==="
          find rpmbuild/output -name "*.rpm" -exec basename {} \;

  # Job 3: Integration test - build hello RPM on EPEL 10 ARM64 (if available)
  test-epel-10-aarch64:
    runs-on: ubuntu-latest
    # Only run on push to main branches (not every PR to save resources)
    if: github.event_name == 'push' || github.event_name == 'schedule'
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          image: multiplatform/qemu-user-static:latest
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        run: |
          docker build -t mock-rpmbuilder:test .

      - name: Prepare test environment
        run: |
          mkdir -p rpmbuild/{SPECS,SOURCES,output,cache}
          curl -L -o rpmbuild/SOURCES/hello-2.10.tar.gz \
            https://ftp.gnu.org/gnu/hello/hello-2.10.tar.gz
          cp tests/hello.spec rpmbuild/SPECS/

      - name: Build RPM with EPEL 10 ARM64
        run: |
          docker run --rm \
            --privileged=true \
            --platform linux/arm64 \
            --volume "$(pwd)/rpmbuild:/rpmbuild" \
            -e MOCK_CONFIG="epel-10-aarch64" \
            -e MOUNT_POINT="/rpmbuild" \
            -e SPEC_FILE="SPECS/hello.spec" \
            -e SOURCES="SOURCES" \
            mock-rpmbuilder:test

      - name: Verify ARM64 RPMs built
        run: |
          RPM_COUNT=$(find rpmbuild/output -name "*.rpm" -type f | wc -l)
          echo "Found $RPM_COUNT RPM files"
          if [ "$RPM_COUNT" -lt 1 ]; then
            echo "ERROR: No RPMs built!"
            exit 1
          fi

  # Job 4: Push to registry (only on master/main and releases)
  push:
    runs-on: ubuntu-latest
    needs: [build, test-centos-stream-10]
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Job 5: Push to Docker Hub (only on release tags)
  push-docker-hub:
    runs-on: ubuntu-latest
    needs: [build, test-centos-stream-10]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          docker build -t mmornati/mock-rpmbuilder:$VERSION -t mmornati/mock-rpmbuilder:latest .
          docker push mmornati/mock-rpmbuilder:$VERSION
          docker push mmornati/mock-rpmbuilder:latest
