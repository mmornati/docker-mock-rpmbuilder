name: Build RPM

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'  # Weekly sanity build

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and test Docker image
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha,scope=build
          cache-to: type=gha,mode=max,scope=build

      - name: Inspect image
        run: |
          docker inspect ${{ env.IMAGE_NAME }}:test

      - name: Verify Mock installation
        run: |
          docker run --rm --name mocktest ${{ env.IMAGE_NAME }}:test \
            su - mockbuilder -c "/usr/sbin/mock --version"

      - name: Run ShellCheck on build script
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."

  # Job 2: Integration test - build hello RPM on Rocky 10 x86_64
  test-rocky-10-x86_64:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mock-rpmbuilder:test
          cache-from: type=gha,scope=build
          cache-to: type=gha,mode=max,scope=test-x86

      - name: Prepare test environment
        run: |
          mkdir -p rpmbuild/{SPECS,SOURCES,output,cache}
          # Download hello source
          curl -L -o rpmbuild/SOURCES/hello-2.10.tar.gz \
            https://ftp.gnu.org/gnu/hello/hello-2.10.tar.gz
          # Copy spec file
          cp tests/hello.spec rpmbuild/SPECS/

      - name: Build RPM with CentOS Stream 10
        run: |
          docker run --rm \
            --privileged=true \
            --volume "$(pwd)/rpmbuild:/rpmbuild" \
            -e MOCK_CONFIG="rocky-10-x86_64" \
            -e MOUNT_POINT="/rpmbuild" \
            -e SPEC_FILE="SPECS/hello.spec" \
            -e SOURCES="SOURCES" \
            -e NO_CLEANUP="true" \
            mock-rpmbuilder:test

      - name: Check build output
        run: |
          echo "=== Output directory ==="
          ls -la rpmbuild/output/rocky-10-x86_64/
          echo ""
          echo "=== Built RPMs ==="
          find rpmbuild/output -name "*.rpm" -type f
          echo ""
          echo "=== Build log ==="
          cat rpmbuild/output/rocky-10-x86_64/build.log

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-rocky-10-x86_64
          path: rpmbuild/output/rocky-10-x86_64/
          retention-days: 7

      - name: Verify RPMs built
        run: |
          RPM_COUNT=$(find rpmbuild/output -name "*.rpm" -type f | wc -l)
          echo "Found $RPM_COUNT RPM files"
          if [ "$RPM_COUNT" -lt 1 ]; then
            echo "ERROR: No RPMs built!"
            exit 1
          fi
          echo "=== RPM list ==="
          find rpmbuild/output -name "*.rpm" -exec basename {} \;

  # Job 3: Integration test - build hello RPM on EPEL 10 ARM64 (if available)
  test-epel-10-aarch64:
    runs-on: ubuntu-latest
    # Only run on push to main branches (not every PR to save resources)
    if: github.event_name == 'push' || github.event_name == 'schedule'
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: mock-rpmbuilder:test
          cache-from: type=gha,scope=build
          cache-to: type=gha,mode=max,scope=test-arm

      - name: Prepare test environment
        run: |
          mkdir -p rpmbuild/{SPECS,SOURCES,output,cache}
          curl -L -o rpmbuild/SOURCES/hello-2.10.tar.gz \
            https://ftp.gnu.org/gnu/hello/hello-2.10.tar.gz
          cp tests/hello.spec rpmbuild/SPECS/

      - name: Build RPM with EPEL 10 ARM64
        run: |
          docker run --rm \
            --privileged=true \
            --platform linux/arm64 \
            --volume "$(pwd)/rpmbuild:/rpmbuild" \
            -e MOCK_CONFIG="rocky+epel-10-aarch64" \
            -e MOUNT_POINT="/rpmbuild" \
            -e SPEC_FILE="SPECS/hello.spec" \
            -e SOURCES="SOURCES" \
            mock-rpmbuilder:test

      - name: Show ARM64 build log
        run: |
          if [ -f rpmbuild/output/rocky+epel-10-aarch64/build.log ]; then
            echo "=== Build log ==="
            cat rpmbuild/output/rocky+epel-10-aarch64/build.log
          else
            echo "No build.log found"
          fi

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-rocky-epel-10-aarch64
          path: rpmbuild/output/rocky+epel-10-aarch64/
          retention-days: 7

      - name: Verify ARM64 RPMs built
        run: |
          RPM_COUNT=$(find rpmbuild/output -name "*.rpm" -type f | wc -l)
          echo "Found $RPM_COUNT RPM files"
          if [ "$RPM_COUNT" -lt 1 ]; then
            echo "ERROR: No RPMs built!"
            exit 1
          fi

  # Job 4: Push to registry (only on master/main and releases)
  push:
    runs-on: ubuntu-latest
    needs: [build, test-rocky-10-x86_64]
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=build

  # Job 5: Push to Docker Hub (only on release tags)
  push-docker-hub:
    runs-on: ubuntu-latest
    needs: [build, test-rocky-10-x86_64]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mmornati/mock-rpmbuilder:${{ github.ref_name }}
            mmornati/mock-rpmbuilder:latest
          cache-from: type=gha,scope=build
